<div class="admin-page">
  <header class="page-header">
    <div>
      <span class="page-kicker">Calendrier</span>
      <h1>Calendriers et jours feries</h1>
      <p>Gerer les annees et les jours feries SOPHATEL.</p>
    </div>
    <button type="button" class="btn-primary" (click)="ouvrirAjout()" [disabled]="!selectedAgendaId()">
      Ajouter jour ferie
    </button>
  </header>

  <section class="toolbar-card">
    <form class="toolbar-form" (ngSubmit)="creerAgenda()">
      <label class="field">
        <span>Nouvelle annee</span>
        <input type="number" name="annee" [(ngModel)]="agendaForm.annee" [min]="currentYear" required />
      </label>
      <button type="submit" class="btn-primary" [disabled]="isSavingAgenda()">
        {{ isSavingAgenda() ? 'Creation...' : 'Creer annee' }}
      </button>
    </form>

    <label class="field">
      <span>Annee affichee</span>
      <select name="agenda" [ngModel]="selectedAgendaId()" (ngModelChange)="selectionnerAgenda($event)">
        <option [ngValue]="null">Selectionner une annee</option>
        <option *ngFor="let agenda of agendas()" [value]="agenda.id">{{ agenda.annee }}</option>
      </select>
    </label>
  </section>

  <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <section class="calendar-shell">
    <div class="calendar-header">
      <button type="button" class="btn-secondary" (click)="moisPrecedent()" [disabled]="!selectedAgendaId()">Previous</button>
      <h2>{{ monthLabel() }}</h2>
      <button type="button" class="btn-secondary" (click)="moisSuivant()" [disabled]="!selectedAgendaId()">Next</button>
    </div>

    <div class="calendar-grid">
      <div class="weekday" *ngFor="let day of weekdays">{{ day }}</div>
      <button
        type="button"
        class="calendar-day"
        *ngFor="let cell of calendarDays()"
        [class.muted]="!cell.inMonth"
        [class.today]="cell.isToday"
        (click)="ouvrirAjout(cell.date)"
      >
        <span class="day-number">{{ cell.day }}</span>
        <span
          class="holiday-pill"
          *ngFor="let jour of cell.joursFeries"
          title="Modifier ce jour ferie"
          (click)="modifierDepuisCalendrier(jour, $event)"
        >
          {{ jour.nom }}
        </span>
      </button>
    </div>

    <p class="empty-cell" *ngIf="!selectedAgendaId()">Selectionnez ou creez une annee pour afficher le calendrier.</p>
  </section>
</div>

<div class="modal-backdrop" *ngIf="showModal()">
  <form class="holiday-modal" (ngSubmit)="enregistrer()">
    <button type="button" class="modal-close" title="Fermer" (click)="fermerModal()">x</button>
    <h2>{{ editingId ? 'Modifier un jour ferie' : 'Ajouter un jour ferie' }}</h2>

    <div class="modal-lines">
      <div class="modal-line" *ngFor="let jour of modalForms; let i = index">
        <div class="line-title">
          <strong>Jour ferie</strong>
        </div>
        <label class="field">
          <span>Nom*</span>
          <input [name]="'modal-nom-' + i" [(ngModel)]="jour.nom" placeholder="Ex. Aid Al Fitr" required />
        </label>
        <label class="field">
          <span>Date debut*</span>
          <input type="date" [name]="'modal-dateDebut-' + i" [(ngModel)]="jour.dateDebut" required />
        </label>
        <label class="field">
          <span>Date fin*</span>
          <input type="date" [name]="'modal-dateFin-' + i" [(ngModel)]="jour.dateFin" required />
        </label>
        <label class="field">
          <span>Description</span>
          <input [name]="'modal-description-' + i" [(ngModel)]="jour.description" placeholder="Description" />
        </label>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-danger" *ngIf="editingId" (click)="supprimerDepuisModal()" [disabled]="isSaving()">
        Supprimer
      </button>
      <button type="button" class="btn-secondary" (click)="fermerModal()">Annuler</button>
      <button type="submit" class="btn-primary" [disabled]="isSaving()">
        {{ isSaving() ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </div>
  </form>
</div>
