<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">Mon Profil</h1>
      <p class="page-subtitle">Informations personnelles et soldes de conges.</p>
    </div>
  </div>

  <div class="state-card" *ngIf="isLoading()">Chargement du profil...</div>

  <div class="state-card error" *ngIf="!isLoading() && errorMessage()">
    <span>{{ errorMessage() }}</span>
    <button type="button" class="btn-primary" (click)="chargerProfil()">Reessayer</button>
  </div>

  <div class="profile-grid" *ngIf="!isLoading() && profil() as profil">
    <div class="card identity-card">
      <div class="avatar-section">
        <div class="profile-avatar">{{ avatar }}</div>
        <div class="identity-info">
          <h2 class="identity-name">{{ profil.prenom }} {{ profil.nom }}</h2>
          <span class="identity-poste">{{ roleLabel }}</span>
          <span class="identity-dept">{{ profil.departement || 'Aucun departement' }}</span>
        </div>
      </div>

      <div class="meta-list">
        <div class="meta-item">
          <span class="meta-label">Responsable</span>
          <span class="meta-value">{{ profil.responsable || 'Non renseigne' }}</span>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Coordonnees</h3>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Prenom</label>
            <input class="form-input readonly" readonly [value]="profil.prenom" />
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input class="form-input readonly" readonly [value]="profil.nom" />
          </div>
          <div class="form-group full-width">
            <label class="form-label">Email</label>
            <input class="form-input readonly" readonly [value]="profil.email" />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
